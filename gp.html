<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Pay via Google Pay</title>
<style>
  body { font-family: -apple-system, sans-serif; background: linear-gradient(135deg, #1a3a5c, #0b2545); color: #fff; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
  .card { text-align: center; max-width: 320px; }
  .logo { font-size: 28px; font-weight: 800; background: linear-gradient(135deg, #4285F4, #34A853, #FBBC05, #EA4335); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 16px; }
  .spinner { width: 32px; height: 32px; border: 3px solid #ffffff20; border-top-color: #4285F4; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 16px auto; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .status { color: #ffffff80; font-size: 14px; margin: 8px 0; }
  .amount { font-size: 36px; font-weight: 800; margin: 8px 0; }
  .to { font-size: 13px; color: #ffffff60; }
  .btn { display: block; width: 100%; padding: 14px; margin: 8px 0; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; text-decoration: none; text-align: center; }
  .btn-primary { background: #4285F4; color: white; }
  .btn-secondary { background: #ffffff15; color: #fff; border: 1px solid #ffffff30; }
  .hidden { display: none; }
</style>
<script>
  var p = new URLSearchParams(window.location.search);

  var vpa = p.get('vpa') || p.get('pa') || 'deepaperi.tech@okicici';
  var name = p.get('pn') || 'Deepa Tech';
  var am = p.get('am') || '1';
  var txnNote = p.get('tn') || 'Payment';

  var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

  // Manual-payment (P2P) params only. No mode/mc/tr — those trigger GPay's
  // NPCI merchant-validation path and need mid/sign which we don't have.
  var upiParams = 'pa=' + encodeURIComponent(vpa) +
    '&pn=' + encodeURIComponent(name) +
    '&am=' + am +
    '&cu=INR' +
    '&tn=' + encodeURIComponent(txnNote);

  // Manifest-registered entry points (verified from AndroidManifest.xml):
  //   UpiIntentFilter listens on scheme=upi, host=pay → standard UPI confirm screen
  //   gpay://, tez:// are Dart-routed; only gpay://card/pay is in dex strings
  var upiGeneric = 'upi://pay?' + upiParams;
  var intentUpi = 'intent://pay?' + upiParams + '#Intent;scheme=upi;package=com.google.android.apps.nbu.paisa.user;end';
  var gpayScheme = 'gpay://upi/pay?' + upiParams;
  var tezScheme = 'tez://upi/pay?' + upiParams;

  var links;
  if (isIOS) {
    links = [gpayScheme, tezScheme, upiGeneric];
  } else {
    links = [intentUpi, upiGeneric];
  }

  function openLink(url) {
    if (isIOS) {
      var a = document.createElement('a');
      a.href = url;
      a.style.display = 'none';
      document.body.appendChild(a);
      a.click();
      setTimeout(function() { document.body.removeChild(a); }, 100);
    } else {
      window.location.href = url;
    }
  }

  var tried = 0;
  function tryOpen(index) {
    var i = (index !== undefined) ? index : tried++;
    if (i < links.length) {
      openLink(links[i]);
    }
  }

  var debugMode = p.get('debug') === '1';

  window.onload = function() {
    document.getElementById('amt').textContent = '₹' + am;
    document.getElementById('name').textContent = name;

    if (debugMode) {
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('status').textContent = 'DEBUG MODE — auto-redirect disabled. Tap a button below to fire the intent.';
      document.getElementById('buttons').classList.remove('hidden');
    } else if (isIOS) {
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('status').textContent = 'Tap below to open Google Pay';
      document.getElementById('buttons').classList.remove('hidden');
    } else {
      tryOpen(0);
      setTimeout(function() { tryOpen(1); }, 1800);
      setTimeout(function() {
        document.getElementById('spinner').style.display = 'none';
        document.getElementById('status').textContent = 'Google Pay did not open?';
        document.getElementById('buttons').classList.remove('hidden');
      }, 4000);
    }

    if (isIOS) {
      document.getElementById('btn2').textContent = 'Try Tez Scheme';
      document.getElementById('btn3').textContent = 'Open via UPI';
    } else {
      document.getElementById('btn3').style.display = 'none';
      document.getElementById('btn2').textContent = 'Try Generic UPI';
      document.getElementById('btn2').setAttribute('onclick', 'tryOpen(1);return false;');
    }
  };
</script>
</head>
<body>
<div class="card">
  <div class="logo">Google Pay</div>
  <div class="amount" id="amt">&#8377;1</div>
  <div class="to">Pay to <strong id="name">Deepa Tech</strong></div>
  <div class="spinner" id="spinner"></div>
  <div class="status" id="status">Opening Google Pay...</div>
  <div id="buttons" class="hidden">
    <a class="btn btn-primary" href="#" onclick="tryOpen(0);return false;">Open Google Pay</a>
    <a class="btn btn-secondary" href="#" onclick="tryOpen(1);return false;" id="btn2">Try Tez Intent</a>
    <a class="btn btn-secondary" href="#" onclick="tryOpen(2);return false;" id="btn3">Try Generic UPI</a>
  </div>
  <div id="debug" style="margin-top:24px;font-size:11px;color:#ffeb3b;word-break:break-all;text-align:left;line-height:1.5;background:#00000040;padding:10px;border-radius:8px;"></div>
</div>
<script>
  document.getElementById('debug').innerHTML =
    '<strong>vpa:</strong> ' + vpa + '<br>' +
    '<strong>pn:</strong> ' + name + '<br>' +
    '<strong>am:</strong> ' + am + '<br><br>' +
    '<strong>link[0]:</strong> ' + (links && links[0] ? links[0] : '(none)') + '<br><br>' +
    '<strong>link[1]:</strong> ' + (links && links[1] ? links[1] : '(none)');
</script>
</body>
</html>
