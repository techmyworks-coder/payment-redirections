<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pay via Paytm</title>
<style>
  body { font-family: -apple-system, sans-serif; background: #00295e; color: #fff; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
  .card { text-align: center; max-width: 320px; }
  .logo { font-size: 28px; font-weight: 800; color: #00b9f5; margin-bottom: 16px; }
  .spinner { width: 32px; height: 32px; border: 3px solid #ffffff20; border-top-color: #00b9f5; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 16px auto; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .status { color: #ffffff80; font-size: 14px; margin: 8px 0; }
  .amount { font-size: 36px; font-weight: 800; margin: 8px 0; }
  .to { font-size: 13px; color: #ffffff60; }
  .btn { display: block; width: 100%; padding: 14px; margin: 8px 0; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; text-decoration: none; text-align: center; }
  .btn-primary { background: #00b9f5; color: white; }
  .btn-secondary { background: #ffffff15; color: #fff; border: 1px solid #ffffff30; }
  .hidden { display: none; }
</style>
<script>
  var p = new URLSearchParams(window.location.search);
  var vpa = p.get('vpa') || '9145899828@okbizaxis';
  var name = p.get('pn') || 'Man Mohan Light Decoration';
  var am = p.get('am') || '1';

  var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

  // UPI pay with merchant flags (from decompiled Paytm APK — QuickPaymentActivity uses am= not amount=)
  var txnRef = 'TXN' + Date.now() + Math.floor(Math.random() * 1000);
  var upiParams = 'pa=' + encodeURIComponent(vpa) +
    '&pn=' + encodeURIComponent(name) +
    '&am=' + parseFloat(am).toFixed(2) +
    '&cu=INR' +
    '&mode=02' +
    '&mc=0000' +
    '&tr=' + txnRef +
    '&tn=Payment';

  var paytmPay = 'paytmmp://pay?' + upiParams;
  var paytmMoneyTransfer = 'paytmmp://cash_wallet?featuretype=money_transfer&pa=' + encodeURIComponent(vpa) + '&pn=' + encodeURIComponent(name) + '&am=' + am;
  var upiGeneric = 'upi://pay?' + upiParams;
  var intentPay = 'intent://pay?' + upiParams + '#Intent;scheme=paytmmp;package=net.one97.paytm;end';

  var links;
  if (isIOS) {
    links = [paytmPay, upiGeneric];
  } else {
    // Android cascade: Paytm UPI intent → money_transfer send screen → generic UPI
    links = [intentPay, paytmMoneyTransfer, upiGeneric];
  }

  function openLink(url) {
    if (isIOS) {
      var a = document.createElement('a');
      a.href = url;
      a.style.display = 'none';
      document.body.appendChild(a);
      a.click();
      setTimeout(function() { document.body.removeChild(a); }, 100);
    } else {
      window.location.href = url;
    }
  }

  var tried = 0;
  function tryOpen(index) {
    var i = (index !== undefined) ? index : tried++;
    if (i < links.length) {
      openLink(links[i]);
    }
  }

  window.onload = function() {
    document.getElementById('amt').textContent = '₹' + am;
    document.getElementById('name').textContent = name;

    if (isIOS) {
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('status').textContent = 'Tap below to open Paytm';
      document.getElementById('buttons').classList.remove('hidden');
    } else {
      tryOpen();
      setTimeout(tryOpen, 2000);
      setTimeout(tryOpen, 4000);
      setTimeout(function() {
        document.getElementById('spinner').style.display = 'none';
        document.getElementById('status').textContent = 'Paytm did not open automatically';
        document.getElementById('buttons').classList.remove('hidden');
      }, 5000);
    }
  };
</script>
</head>
<body>
<div class="card">
  <div class="logo">Paytm</div>
  <div class="amount" id="amt">&#8377;1</div>
  <div class="to">Pay to <strong id="name">Man Mohan Light Decoration</strong></div>
  <div class="spinner" id="spinner"></div>
  <div class="status" id="status">Opening Paytm...</div>
  <div id="buttons" class="hidden">
    <a class="btn btn-primary" href="#" onclick="tryOpen(0);return false;">Open Paytm</a>
    <a class="btn btn-secondary" href="#" onclick="tryOpen(1);return false;" id="ptm-btn2">Try UPI Pay</a>
  </div>
</div>
</body>
</html>
