<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pay via PhonePe</title>
<style>
  body { font-family: -apple-system, sans-serif; background: #1a0533; color: #fff; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
  .card { text-align: center; max-width: 320px; }
  .logo { font-size: 28px; font-weight: 800; background: linear-gradient(135deg, #5f259f, #7b3fe4); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 16px; }
  .spinner { width: 32px; height: 32px; border: 3px solid #ffffff20; border-top-color: #7b3fe4; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 16px auto; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .status { color: #ffffff80; font-size: 14px; margin: 8px 0; }
  .btn { display: block; width: 100%; padding: 14px; margin: 8px 0; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; text-decoration: none; text-align: center; }
  .btn-primary { background: linear-gradient(135deg, #5f259f, #7b3fe4); color: white; }
  .hidden { display: none; }
  .amount { font-size: 36px; font-weight: 800; margin: 8px 0; }
  .to { font-size: 13px; color: #ffffff60; }
</style>
<script>
  var p = new URLSearchParams(window.location.search);
  var vpa = p.get('vpa') || '9145899828@okbizaxis';
  var name = p.get('pn') || 'Man Mohan Light Decoration';
  var am = p.get('am') || '1';
  var txnNote = p.get('tn') || 'Payment';

  var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

  // PhonePe p2pContactChat payload — VPA-typed contact (from velora production code)
  // Opens PhonePe chat-with-contact screen for the VPA, amount + note pre-filled
  var payload = {
    contactInfo: {
      type: "VPA",
      name: name,
      vpa: vpa,
      isOnPhonePe: true,
      isUpiEnabled: true,
      hasExternalVpa: true
    },
    withSheetExpanded: true,
    shouldShowUnsavedBanner: false,
    shouldAutoShowKeyboard: true,
    initialTab: "SEND",
    sendParams: { initialAmount: Math.round(parseFloat(am) * 100), note: txnNote },
    validateDestination: false
  };
  var b64 = btoa(JSON.stringify(payload));
  var chatLink = 'phonepe://native?id=p2pContactChat&data=' + b64;

  function openLink(url) {
    if (isIOS) {
      var a = document.createElement('a');
      a.href = url;
      a.style.display = 'none';
      document.body.appendChild(a);
      a.click();
      setTimeout(function() { document.body.removeChild(a); }, 100);
    } else {
      window.location.href = url;
    }
  }

  function tryOpen() {
    openLink(chatLink);
  }

  window.onload = function() {
    document.getElementById('amt').textContent = '₹' + am;
    document.getElementById('name').textContent = name;

    if (isIOS) {
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('status').textContent = 'Tap below to open PhonePe';
      document.getElementById('buttons').classList.remove('hidden');
    } else {
      tryOpen();
      setTimeout(function() {
        document.getElementById('spinner').style.display = 'none';
        document.getElementById('status').textContent = 'PhonePe did not open?';
        document.getElementById('buttons').classList.remove('hidden');
      }, 3000);
    }
  };
</script>
</head>
<body>
<div class="card">
  <div class="logo">PhonePe</div>
  <div class="amount" id="amt">&#8377;1</div>
  <div class="to">Pay to <strong id="name">Man Mohan Light Decoration</strong></div>
  <div class="spinner" id="spinner"></div>
  <div class="status" id="status">Opening PhonePe...</div>
  <div id="buttons" class="hidden">
    <a class="btn btn-primary" href="#" onclick="tryOpen();return false;">Open PhonePe</a>
  </div>
</div>
</body>
</html>
